<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chetan | Portfolio</title>
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

    body {
      font-family: 'Poppins', sans-serif;
      color: #f8fafc;
      overflow-x: hidden;
      background: linear-gradient(120deg, #050505, #0f0f0f, #060606);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
    }

    /* Floating particles */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: radial-gradient(circle at 20% 20%, rgba(0,255,100,0.12) 0%, transparent 20%),
                        radial-gradient(circle at 80% 80%, rgba(150,0,255,0.12) 0%, transparent 20%);
      animation: floatGlow 10s linear infinite alternate;
      z-index: 0;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      position: fixed;
      width: 100%;
      top: 0;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(8px);
      z-index: 10;
      animation: slideDown 1.2s ease forwards;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      color: #00ff88;
      letter-spacing: 1px;
      text-shadow: 0 0 15px rgba(0,255,100,0.3);
      cursor: pointer;
    }

    nav a {
      margin-left: 25px;
      text-decoration: none;
      color: #f8fafc;
      font-weight: 500;
      position: relative;
      transition: color 0.3s ease;
      padding-bottom: 3px;
    }

    nav a::after {
      content: '';
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: -5px;
      left: 0;
      background-color: #8b5cf6;
      transition: width 0.3s ease;
    }

    nav a:hover::after { width: 100%; }
    nav a:hover { color: #8b5cf6; }

    nav a.active {
      color: #00ff88;
      text-shadow: 0 0 8px rgba(0,255,100,0.3);
    }

    nav a.active::after {
      width: 100%;
    }

    /* Hero Section */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 1;
      position: relative;
    }

    .hero h1 {
      font-size: 52px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* Typing animation */
    .typing {
      display: inline-block;
      border-right: 3px solid #00ff88;
      white-space: nowrap;
      overflow: hidden;
      color: #00ff88;
      line-height: 1.2;
      animation:
        typing 1s steps(var(--steps, 7), end) 1s forwards,
        blink 0.5s step-end infinite;
    }

    .hero p {
      font-size: 18px;
      color: #b0b0b0;
      margin-top: 20px;
      max-width: 600px;
      opacity: 0;
      animation: fadeInUp 2.5s ease forwards;
    }

    .hero a {
      display: inline-block;
      margin-top: 40px;
      background: linear-gradient(90deg, #00ff88, #8b5cf6);
      color: #0a0a0a;
      padding: 12px 32px;
      border-radius: 30px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 0 15px rgba(0,255,136,0.6);
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadeInUp 3s ease forwards;
    }

    .hero a:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 0 25px rgba(139,92,246,0.7),
                  0 0 50px rgba(0,255,136,0.4);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 20px;
      background: #0a0a0a;
      color: #aaaaaa;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    footer a {
      color: #00ff88;
      text-decoration: none;
    }

    /* Animations */
    @keyframes typing {
      from { width: 0; }
      to { width: var(--width, 7ch); }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes floatGlow {
      from { transform: translateY(0); }
      to { transform: translateY(-25px); }
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(40px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 700px) {
      header { padding: 20px; }
      .hero h1 { font-size: 36px; flex-direction: column; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">CHETAN</div>
    <nav>
      <a href="/" class="active">Home</a>
      <a href="/about">About Me</a>
      <a href="/aboutCodroidhub">CodroidHub</a>
      <a href="/projects">Projects</a>
      <a href="https://github.com/ChetanNewH" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/company/codroidhub" target="_blank">LinkedIn</a>
    </nav>
  </header>

  <section class="hero" id="home">
    <h1>
      <span>Hey!, I'm</span>
      <span class="typing" style="--width: 7ch; --steps: 7;">Chetan&nbsp;</span>
    </h1>
    <p>Aspiring Data Scientist & Web Developer passionate about blending creativity with technology.</p>
    <a href="/projects">Explore My Work</a>
  </section>

  <footer id="contact">
    <p>© 2025 Chetan | Designed with precision & vision</p>
  </footer>

</body>
</html>
